<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBFS Certificate Verification & Issuance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Outfit', sans-serif; background: #f8fafc; color: #334155; }
    .hidden { display: none !important; }
    .glass-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="antialiased selection:bg-brand-500 selection:text-white">

  <!-- LOGIN SCREEN -->
  <div id="loginView" class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
    <div class="glass-panel w-full max-w-md p-8 md:p-10 fade-in text-center">
      <div class="w-16 h-16 bg-brand-100 text-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-5 text-3xl">
        <i class="fas fa-certificate"></i>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Certificate App</h2>
      <p class="text-slate-500 mt-2 font-medium">Please login via Central Portal</p>
      <div id="loginMessage" class="mt-4 text-sm font-semibold p-3 rounded-lg bg-blue-50 text-blue-600">Waiting for authentication...</div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="appView" class="hidden min-h-screen flex flex-col bg-slate-50">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 px-6 h-20 flex items-center justify-between shadow-sm">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-brand-600 text-white rounded-xl flex items-center justify-center text-lg">
          <i class="fas fa-certificate"></i>
        </div>
        <div>
          <h2 class="text-xl font-extrabold text-slate-800">Leaving Certificates</h2>
          <p class="text-xs text-slate-500 font-medium">Verify & Issue</p>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <div class="bg-brand-50 text-brand-700 px-4 py-2 rounded-full font-bold text-sm border border-brand-100 shadow-sm">
          <i class="fas fa-user-circle mr-1"></i> <span id="userNameDisplay">User</span> (<span id="userRoleDisplay">Role</span>)
        </div>
        <button id="logoutBtn" class="text-slate-500 hover:text-red-600 bg-slate-100 hover:bg-red-50 w-10 h-10 rounded-full flex items-center justify-center transition-colors">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </header>

    <main class="flex-1 p-6 lg:p-10 max-w-5xl mx-auto w-full fade-in flex flex-col md:flex-row gap-8">
      
      <!-- Verification Form -->
      <div class="w-full md:w-1/2 flex flex-col gap-6">
        <div class="glass-panel p-6 lg:p-8">
          <h3 class="text-xl font-extrabold text-slate-800 mb-2">Student Verification</h3>
          <p class="text-sm text-slate-500 mb-6">Enter details exactly as they appear on the admission form to verify against the master database.</p>
          
          <form id="verifyForm" class="space-y-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1.5">G.R. No (Required)</label>
              <input id="vfGrNo" type="text" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1.5">Student Name</label>
              <input id="vfName" type="text" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1.5">Father's Name</label>
              <input id="vfFather" type="text" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5">Date of Birth</label>
                <input id="vfDob" type="date" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm">
              </div>
              <div>
                <label class="block text-sm font-bold text-slate-700 mb-1.5">Current Class</label>
                <input id="vfClass" type="text" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm" placeholder="e.g. Eighth Class">
              </div>
            </div>
            
            <button type="submit" id="verifyBtn" class="w-full bg-slate-900 hover:bg-brand-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-md flex justify-center items-center gap-2 mt-4">
              <i class="fas fa-search"></i> Verify Student Data
            </button>
          </form>
        </div>
      </div>

      <!-- Feedback & Action Area -->
      <div class="w-full md:w-1/2 flex flex-col gap-6">
        
        <div id="feedbackBox" class="glass-panel p-6 lg:p-8 hidden">
          <div id="feedbackIcon" class="w-12 h-12 rounded-full flex items-center justify-center text-xl mb-4"></div>
          <h3 id="feedbackTitle" class="text-xl font-extrabold text-slate-800 mb-2">Verification Status</h3>
          <div id="feedbackMessage" class="text-sm font-medium mb-4"></div>
          <ul id="mismatchList" class="text-sm text-red-600 list-disc list-inside mb-4 space-y-1 hidden"></ul>
          
          <button id="generateBtn" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-md flex justify-center items-center gap-2">
            <i class="fas fa-download"></i> Generate & Download Certificate (PDF)
          </button>
          <div id="downloadStatus" class="hidden mt-4 text-sm font-bold text-center text-slate-600"></div>
        </div>

      </div>

    </main>
  </div>

  <script>
    // --- Configuration ---
    const API_URL = "https://script.google.com/macros/s/AKfycbzrcDptT72e1HEen7VxJY9xMi7V2PU_ksS9P5-rUZeavFD1tfH7h1gjrneUB7DPhGZg/exec"; 
    
    const CONFIG = {
      portalApiBaseUrl: "https://script.google.com/macros/s/AKfycbxma7ltR4xYcIws1mLxMmZBXGgnxAwUHJszD9zC6-GMwMmJ837MjK-n1iSDLalOLOIt/exec",
      portalAppId: "certificate-app"
    };
    const STORAGE_KEY = "ibfs_cert_app_user";
    let state = { user: null, verifiedStudentData: null };

    const $ = id => document.getElementById(id);
    const box = $('feedbackBox');
    const fIcon = $('feedbackIcon');
    const fTitle = $('feedbackTitle');
    const fMsg = $('feedbackMessage');
    const mList = $('mismatchList');
    const genBtn = $('generateBtn');
    const dlStatus = $('downloadStatus');

    $('verifyForm').addEventListener('submit', handleVerify);
    $('generateBtn').addEventListener('click', handleIssue);
    $('logoutBtn').addEventListener('click', handleLogout);

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      
      if (token) {
        await loginWithPortalToken(token);
      } else {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          state.user = JSON.parse(saved);
          renderApp();
        } else {
          $('loginMessage').innerText = "Access denied. No session token found. Please open this app from the Central Portal.";
          $('loginMessage').className = "mt-4 text-sm font-semibold p-3 rounded-lg bg-red-50 text-red-600";
        }
      }
    }

    async function loginWithPortalToken(token) {
      const appId = new URLSearchParams(window.location.search).get("appId") || CONFIG.portalAppId;
      try {
        const portalApiUrl = new URLSearchParams(window.location.search).get("portalApiUrl") || CONFIG.portalApiBaseUrl;
        const res = await fetch(portalApiUrl, {
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "verifyAccess", token, appId })
        });
        const result = await res.json();
        
        if (result && result.status === "success" && result.allowed) {
          state.user = result.user || result;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.user));
          renderApp();
        } else {
          $('loginMessage').innerText = result.message || "Portal access denied.";
          $('loginMessage').className = "mt-4 text-sm font-semibold p-3 rounded-lg bg-red-50 text-red-600";
        }
      } catch (err) {
        $('loginMessage').innerText = "Portal connection failed.";
      }
    }

    function renderApp() {
      $('loginView').classList.add('hidden');
      $('appView').classList.remove('hidden');
      const u = state.user;
      $('userNameDisplay').innerText = u.name || (u.email ? u.email.split('@')[0] : "User");
      $('userRoleDisplay').innerText = u.appRole || u.role || "User";
    }

    function handleLogout() {
      localStorage.removeItem(STORAGE_KEY);
      window.location.reload();
    }

    async function handleVerify(e) {
      e.preventDefault();
      const payload = {
        action: 'verify',
        grNo: $('vfGrNo').value.trim(),
        name: $('vfName').value.trim(),
        fatherName: $('vfFather').value.trim(),
        dob: $('vfDob').value.trim(),
        currentClass: $('vfClass').value.trim(),
        schoolCode: state.user.schoolCode || state.user.scope ? state.user.scope.replace('school=','') : '',
        role: state.user.appRole || state.user.role
      };

      const btn = $('verifyBtn');
      btn.disabled = true;
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Verifying...`;
      box.classList.add('hidden');
      dlStatus.classList.add('hidden');

      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        showFeedback(result);
      } catch (err) {
        showFeedback({ status: 'error', message: 'API Connection failed.' });
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fas fa-search"></i> Verify Student Data`;
      }
    }

    function showFeedback(result) {
      box.classList.remove('hidden');
      mList.classList.add('hidden');
      genBtn.classList.add('hidden');
      mList.innerHTML = '';

      if (result.status === 'success') {
        fIcon.className = 'w-12 h-12 rounded-full flex items-center justify-center text-2xl mb-4 bg-green-100 text-green-600';
        fIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
        fTitle.innerText = "Data Verified Successfully!";
        fTitle.className = "text-xl font-extrabold text-green-700 mb-2";
        fMsg.innerText = "All fields match our database records. You can now download the PDF certificate.";
        fMsg.className = "text-sm font-medium mb-4 text-green-600";
        genBtn.classList.remove('hidden');
        state.verifiedStudentData = result.data;
      } else {
        fIcon.className = 'w-12 h-12 rounded-full flex items-center justify-center text-2xl mb-4 bg-red-100 text-red-600';
        fIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        fTitle.innerText = "Verification Failed";
        fTitle.className = "text-xl font-extrabold text-red-700 mb-2";
        fMsg.innerText = result.message || "The following fields do not match our database records:";
        fMsg.className = "text-sm font-medium mb-4 text-red-600";
        
        if (result.mismatches && result.mismatches.length > 0) {
          mList.classList.remove('hidden');
          result.mismatches.forEach(m => {
            const li = document.createElement('li');
            li.innerText = m;
            mList.appendChild(li);
          });
        }
      }
    }

    async function handleIssue() {
      if (!state.verifiedStudentData) return;
      const payload = {
        action: 'issue',
        grNo: state.verifiedStudentData['GR No'] || $('vfGrNo').value.trim(),
        userEmail: state.user.email || 'Unknown User',
        studentData: state.verifiedStudentData
      };

      genBtn.disabled = true;
      genBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Generating PDF... (This may take a moment)`;
      dlStatus.classList.remove('hidden');
      dlStatus.innerText = "Requesting PDF generation from server...";
      dlStatus.className = "mt-4 text-sm font-bold text-center text-blue-600";

      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        
        if (result.status === 'success' && result.pdfBase64) {
          dlStatus.innerText = "Download Starting...";
          dlStatus.className = "mt-4 text-sm font-bold text-center text-green-600";
          
          const a = document.createElement('a');
          a.href = "data:application/pdf;base64," + result.pdfBase64;
          a.download = result.filename || "Certificate.pdf";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          
          setTimeout(() => { dlStatus.innerText = "PDF Downloaded successfully!"; }, 1000);
        } else {
          dlStatus.innerText = "Failed to generate certificate: " + result.message;
          dlStatus.className = "mt-4 text-sm font-bold text-center text-red-600";
        }
      } catch (err) {
        dlStatus.innerText = "Network error while generating certificate.";
        dlStatus.className = "mt-4 text-sm font-bold text-center text-red-600";
      } finally {
        genBtn.disabled = false;
        genBtn.innerHTML = `<i class="fas fa-download"></i> Generate & Download Certificate (PDF)`;
      }
    }

    init();
  </script>
</body>
</html>
